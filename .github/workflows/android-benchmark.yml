name: Android Benchmark

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'benchmark-*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: '是否同时发布 GitHub Release'
        required: true
        type: boolean
        default: false
      release_tag:
        description: '可选：发布用 tag；留空则自动生成 benchmark-时间戳'
        required: false
        default: ''
      release_title:
        description: '可选：Release 标题；留空则自动生成'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: android-benchmark-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  EXPECTED_BENCHMARK_SIGNER_SHA256: 58749c794f0c54af6b69bb6d80248a9fda0b75c687fde55b98d9575fc091633e

jobs:
  benchmark:
    name: Verify + Benchmark APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 授予脚本执行权限
        run: chmod +x ./gradlew ./scripts/*.sh

      - name: 配置固定发布签名
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          DISPATCH_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release || false }}
        run: |
          set -euo pipefail

          require_signing=false
          if [[ "${GITHUB_REF:-}" == "refs/heads/main" || "${GITHUB_REF:-}" == refs/tags/* || "$DISPATCH_PUBLISH" == "true" ]]; then
            require_signing=true
          fi

          if [[ -z "$KEYSTORE_BASE64" || -z "$STORE_PASSWORD" || -z "$KEY_ALIAS" || -z "$KEY_PASSWORD" ]]; then
            if [[ "$require_signing" == "true" ]]; then
              echo "错误：正式构建缺少固定 Android 发布签名 Secrets" >&2
              exit 1
            fi
            echo "PR 校验未注入发布签名，使用临时本地签名完成门禁。"
            exit 0
          fi

          mkdir -p .gradle-keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > .gradle-keystore/release.keystore
          chmod 600 .gradle-keystore/release.keystore
          {
            echo "ANDROID_RELEASE_KEYSTORE_PATH=${GITHUB_WORKSPACE}/.gradle-keystore/release.keystore"
            echo "ANDROID_RELEASE_STORE_PASSWORD=$STORE_PASSWORD"
            echo "ANDROID_RELEASE_KEY_ALIAS=$KEY_ALIAS"
            echo "ANDROID_RELEASE_KEY_PASSWORD=$KEY_PASSWORD"
            echo "REQUIRE_RELEASE_SIGNING=true"
          } >> "$GITHUB_ENV"

      - name: 执行门禁与 benchmark 构建
        run: ./scripts/verify.sh

      - name: 收集 benchmark APK 与版本元数据
        id: meta
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
          INPUT_RELEASE_TITLE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_title || '' }}
        run: |
          set -euo pipefail

          apk_path="$(./scripts/copy-benchmark-apk.sh)"
          if [[ -z "$apk_path" || ! -f "$apk_path" ]]; then
            echo "错误：未找到时间戳 benchmark APK" >&2
            exit 1
          fi

          apk_name="$(basename "$apk_path")"
          version_name="$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle.kts | head -n 1)"
          version_code="$(sed -n 's/^[[:space:]]*versionCode = \([0-9][0-9]*\)/\1/p' app/build.gradle.kts | head -n 1)"

          if [[ -z "$version_name" || -z "$version_code" ]]; then
            echo "错误：解析 versionName/versionCode 失败" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_RELEASE_TAG:-}" ]]; then
            release_tag="${INPUT_RELEASE_TAG}"
          else
            release_tag="benchmark-$(date '+%Y-%m-%dT%H-%M-%S')-run${GITHUB_RUN_NUMBER}"
          fi

          stable_release=false
          if [[ "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            stable_release=true
            expected_tag="v${version_name}"
            if [[ "$release_tag" != "$expected_tag" ]]; then
              echo "错误：稳定版 Tag $release_tag 与 app 版本 $expected_tag 不一致" >&2
              exit 1
            fi
          fi

          if [[ -n "${INPUT_RELEASE_TITLE:-}" ]]; then
            release_title="${INPUT_RELEASE_TITLE}"
          elif [[ "$stable_release" == "true" ]]; then
            release_title="1memos ${version_name}"
          else
            release_title="1memos benchmark ${version_name} (${release_tag})"
          fi

          artifact_name="benchmark-apk-${version_name}-${version_code}-run${GITHUB_RUN_NUMBER}"
          sha_short="$(git rev-parse --short HEAD)"

          {
            echo "apk_path=$apk_path"
            echo "apk_name=$apk_name"
            echo "version_name=$version_name"
            echo "version_code=$version_code"
            echo "release_tag=$release_tag"
            echo "release_title=$release_title"
            echo "artifact_name=$artifact_name"
            echo "sha_short=$sha_short"
            echo "stable_release=$stable_release"
          } >> "$GITHUB_OUTPUT"

      - name: 核验 Benchmark APK 签名与清单
        shell: bash
        env:
          APK_PATH: ${{ steps.meta.outputs.apk_path }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
        run: |
          set -euo pipefail

          apksigner="$(find "${ANDROID_HOME}" -path '*/build-tools/*/apksigner' -type f | sort -V | tail -n 1)"
          aapt="$(find "${ANDROID_HOME}" -path '*/build-tools/*/aapt' -type f | sort -V | tail -n 1)"
          [[ -x "$apksigner" && -x "$aapt" ]] || { echo "错误：找不到 apksigner/aapt" >&2; exit 1; }

          signer="$($apksigner verify --print-certs "$APK_PATH" | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' | head -n 1 | tr '[:upper:]' '[:lower:]')"
          if [[ -n "${REQUIRE_RELEASE_SIGNING:-}" && "$signer" != "$EXPECTED_BENCHMARK_SIGNER_SHA256" ]]; then
            echo "错误：Benchmark APK 签名证书漂移：$signer" >&2
            exit 1
          fi

          badging="$($aapt dump badging "$APK_PATH" | head -n 1)"
          [[ "$badging" == *"name='cc.pscly.onememos'"* ]] || { echo "错误：APK 包名不正确" >&2; exit 1; }
          [[ "$badging" == *"versionCode='${VERSION_CODE}'"* ]] || { echo "错误：APK versionCode 不正确" >&2; exit 1; }
          [[ "$badging" == *"versionName='${VERSION_NAME}'"* ]] || { echo "错误：APK versionName 不正确" >&2; exit 1; }

      - name: 上传 benchmark APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true

      - name: 生成工作流摘要
        run: |
          {
            echo "## Android benchmark 构建结果"
            echo
            echo "- 版本：\`${{ steps.meta.outputs.version_name }} (${{ steps.meta.outputs.version_code }})\`"
            echo "- 提交：\`${{ github.sha }}\`（${{ steps.meta.outputs.sha_short }}）"
            echo "- APK：\`${{ steps.meta.outputs.apk_name }}\`"
            echo "- Artifact：\`${{ steps.meta.outputs.artifact_name }}\`"
            echo "- 触发方式：\`${{ github.event_name }}\`"
            echo "- 固定签名证书 SHA-256：\`${EXPECTED_BENCHMARK_SIGNER_SHA256}\`"
            echo "- 稳定版：push \`vMAJOR.MINOR.PATCH\` tag；benchmark tag 只发布预发布版本"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 创建或更新 GitHub Release
        id: release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.release_title }}
          APK_PATH: ${{ steps.meta.outputs.apk_path }}
          APK_NAME: ${{ steps.meta.outputs.apk_name }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
          STABLE_RELEASE: ${{ steps.meta.outputs.stable_release }}
        run: |
          set -euo pipefail

          previous_stable_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -Fxv "$RELEASE_TAG" | head -n 1 || true)"
          if [[ -n "$previous_stable_tag" ]]; then
            change_log="$(git log "${previous_stable_tag}..${GITHUB_SHA}" --pretty='- %s')"
          else
            change_log="- 首次稳定版发布"
          fi

          cat > release-notes.md <<EOF
          ## 更新内容

          ${change_log}

          ## 构建信息

          - 版本：${VERSION_NAME} (${VERSION_CODE})
          - 构建时间：$(date '+%Y-%m-%d %H:%M:%S %Z')
          - 提交：${GITHUB_SHA}
          - 工作流：${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - 说明：本 Release 由 GitHub Actions 使用固定签名构建，并上传经过包名、版本和签名校验的 Benchmark APK。
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            mapfile -t existing_apks < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[] | select(.name | endswith(".apk")) | .name')
            if [[ ${#existing_apks[@]} -gt 0 ]]; then
              for asset_name in "${existing_apks[@]}"; do
                gh release delete-asset "$RELEASE_TAG" "$asset_name" --yes
              done
            fi
            gh release upload "$RELEASE_TAG" "$APK_PATH#$APK_NAME"
            if [[ "$STABLE_RELEASE" == "true" ]]; then
              gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-notes.md --prerelease=false --latest
            else
              gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-notes.md --prerelease
            fi
          else
            if [[ "$STABLE_RELEASE" == "true" ]]; then
              gh release create "$RELEASE_TAG" "$APK_PATH#$APK_NAME" \
                --title "$RELEASE_TITLE" \
                --notes-file release-notes.md \
                --target "$GITHUB_SHA" \
                --latest
            else
              gh release create "$RELEASE_TAG" "$APK_PATH#$APK_NAME" \
                --title "$RELEASE_TITLE" \
                --notes-file release-notes.md \
                --target "$GITHUB_SHA" \
                --prerelease
            fi
          fi

          release_url="$(gh release view "$RELEASE_TAG" --json url --jq '.url')"
          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"

      - name: 追加 Release 摘要
        if: steps.release.outputs.release_url != ''
        run: |
          {
            echo
            echo "## GitHub Release"
            echo
            echo "- Tag：\`${{ steps.meta.outputs.release_tag }}\`"
            echo "- URL：${{ steps.release.outputs.release_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
